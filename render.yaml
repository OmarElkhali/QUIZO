# Configuration Render.com pour le backend Python QUIZO
# Déploiement automatique depuis GitHub

services:
  - type: web
    name: quizo-backend
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    rootDir: python_api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300 --max-requests 1000 --max-requests-jitter 50 --keep-alive 5
    envVars:
      - key: PORT
        value: 5000
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CHATGPT_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: MAX_AI_QUESTIONS_PER_QUIZ
        value: "20"
    healthCheckPath: /api/health
    autoDeploy: true  # Déploiement automatique sur push GitHub
    disk:
      name: quizo-data
      mountPath: /data
      sizeGB: 1
